<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma4 Translator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="header-bar">
            <div class="header-brand">
                <h1>Gemma4 Translator</h1>
                <span class="model-badge" id="modelBadge">Gemma4</span>
            </div>
            <div class="mode-tabs">
                <button id="textModeBtn" class="mode-tab active" data-mode="text">Text Mode</button>
                <button id="attachmentModeBtn" class="mode-tab" data-mode="attachment">File Mode</button>
            </div>
            <div class="language-controls">
                <label class="lang-select">
                    <span>From</span>
                    <select id="sourceLanguage">
                        <option value="auto">Auto detect</option>
                        <option value="Arabic">Arabic</option>
                        <option value="English">English</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Italian">Italian</option>
                        <option value="Persian">Persian</option>
                        <option value="Russian">Russian</option>
                        <option value="Chinese">Chinese</option>
                    </select>
                </label>
                <label class="lang-select">
                    <span>To</span>
                    <select id="targetLanguage">
                        <option value="English" selected>English</option>
                        <option value="Arabic">Arabic</option>
                        <option value="Persian">Persian</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Spanish">Spanish</option>
                    </select>
                </label>
            </div>
        </header>

        <section class="workspace">
            <article class="panel" id="textModePanel">
                <div class="panel-header">
                    <h2>Input Text</h2>
                </div>
                <textarea id="textInput" class="text-input-area" placeholder="Enter text to translate..."></textarea>
                <button id="translateTextBtn" class="primary-btn translate-action">Translate</button>
                <div class="panel-header translation-header">
                    <h2>Translation</h2>
                    <button id="copyTranslationBtnText" class="ghost-btn">Copy</button>
                </div>
                <div id="translationAreaText" class="translation-area"></div>
            </article>

            <article class="panel" id="attachmentPanel">
                <div class="panel-header">
                    <h2>Original</h2>
                    <button id="copyOriginalBtn" class="ghost-btn">Copy Text</button>
                </div>
                <div class="file-preview-area" id="filePreview">
                    <div class="empty-state centered">
                        <strong>No file selected</strong>
                        <span>Upload a PDF, DOCX, or TXT file</span>
                    </div>
                </div>
                <div class="upload-overlay" id="uploadOverlay">
                    <div class="upload-box">
                        <label for="fileInput" class="upload-label">
                            <span class="upload-icon">📎</span>
                            <strong>Choose File</strong>
                            <small>PDF, DOCX, or TXT</small>
                        </label>
                        <input type="file" id="fileInput" accept=".pdf,.docx,.txt">
                    </div>
                </div>
                <div class="panel-header">
                    <h2>Translation</h2>
                    <button id="copyTranslationBtn" class="ghost-btn">Copy</button>
                </div>
                <div id="translationArea" class="translation-area"></div>
            </article>
        </section>

        <div id="statusMessage" class="status-message hidden"></div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
