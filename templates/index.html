<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemma4 PDF Translator</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/pdf.js"></script>
</head>
<body>
    <div class="container">
        <div class="pdf-viewer" id="pdfViewer"></div>
        <div class="translation-area" id="translationArea">
            <h2>Translation will appear here</h2>
        </div>
        <div class="controls">
            <input type="file" id="pdfInput" accept="application/pdf">
            <button id="translateBtn">Translate to English</button>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
