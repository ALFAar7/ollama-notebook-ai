<div class="header-bar">
    <div class="header-brand">
        <div class="brand-mark" aria-hidden="true">&#10022;</div>
        <div>
            <p class="eyebrow">AI reading workspace</p>
            <h1>Notebook Translator</h1>
        </div>
    </div>
    <div class="header-actions">
        <div class="mode-tabs">
            <button id="textModeBtn" class="mode-tab active" data-mode="text" aria-pressed="true">Text notebook</button>
            <button id="attachmentModeBtn" class="mode-tab" data-mode="attachment" aria-pressed="false">Source file</button>
        </div>
        <div class="language-controls">
                <label class="lang-select">
                    <span>From</span>
                    <select id="sourceLanguage">
                        <option value="auto">Auto detect</option>
                        <option value="Arabic">Arabic</option>
                        <option value="English" selected>English</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Italian">Italian</option>
                        <option value="Persian">Persian</option>
                        <option value="Russian">Russian</option>
                        <option value="Chinese">Chinese</option>
                    </select>
                </label>
                <label class="lang-select">
                    <span>To</span>
                    <select id="targetLanguage">
                        <option value="English">English</option>
                        <option value="Arabic">Arabic</option>
                        <option value="Persian" selected>Persian</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Spanish">Spanish</option>
                    </select>
                </label>
        </div>
    </div>
</div>
