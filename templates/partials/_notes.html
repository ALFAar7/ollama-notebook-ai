<!-- Tab panel: Notes workspace -->
<section id="panelNotes" class="tab-panel" role="tabpanel" aria-labelledby="tabNotes">
    <article class="panel panel-source">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Notes</p>
                <h2 id="notesTitle">Study notes</h2>
            </div>
            <div class="panel-actions">
                <button id="clearNotesBtn" class="ghost-btn small" title="Clear all notes">Clear</button>
                <button id="saveNotesBtn" class="primary-btn small" title="Save notes">Save</button>
            </div>
        </div>
        <textarea id="notesArea" class="note-textarea" placeholder="Write your notes here..." aria-describedby="notesTitle"></textarea>
    </article>
</section>
