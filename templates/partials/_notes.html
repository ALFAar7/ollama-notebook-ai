<div class="notes-section">
    <div class="sidebar-card">
        <div class="section-head">
            <div>
                <p class="eyebrow">Notes</p>
                <h2>Study notes</h2>
            </div>
            <button id="saveNoteBtn" class="ghost-btn small">Save</button>
        </div>
        <div class="notes-summary" id="notesSummary">
            <div class="empty-state centered">
                <strong>Summary will appear here</strong>
                <span>After translating a page, a quick summary will be generated for your notes.</span>
            </div>
        </div>
        <textarea id="noteInput" class="note-textarea" placeholder="Capture key ideas, questions, or follow-up prompts..."></textarea>
    </div>
</div>
