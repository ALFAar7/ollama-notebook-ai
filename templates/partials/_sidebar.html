<!-- Sidebar: file upload & source settings -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-card">
        <div class="section-head">
            <div>
                <p class="eyebrow">Sources</p>
                <h2>Upload & settings</h2>
            </div>
            <button id="closeSidebarBtn" class="icon-btn" aria-label="Close sidebar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>

        <!-- Upload card -->
        <label for="fileInput" class="upload-card">
            <span class="upload-icon" aria-hidden="true">&#11015;</span>
            <div>
                <strong>Drop in a PDF, DOCX, or TXT</strong>
                <p>Upload a document and it becomes a source for your notebook.</p>
            </div>
        </label>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" hidden>

        <!-- File metadata pills -->
        <div class="source-meta">
            <span class="meta-pill" id="sourceFileName">No file</span>
            <span class="meta-pill" id="sourcePageCount">Pages: &mdash;</span>
        </div>

        <!-- Ollama status -->
        <div class="ollama-status" id="ollamaStatus" aria-live="polite">
            <span class="status-dot" id="ollamaDot"></span>
            <span class="status-label" id="ollamaLabel">Checking Ollama...</span>
        </div>

        <!-- File preview in sidebar -->
        <div class="source-preview" id="filePreviewSidebar">
            <div class="empty-state centered">
                <strong>Add a source document</strong>
                <span>Upload a PDF, DOCX, or TXT file to get started.</span>
            </div>
        </div>
    </div>
</aside>
<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
