<!-- Tab panel: Text workspace -->
<section id="panelText" class="tab-panel active" role="tabpanel" aria-labelledby="tabText">
    <div class="translation-workspace">
        <!-- Source column -->
        <article class="panel panel-source">
            <div class="panel-header">
                <div>
                    <p class="eyebrow">Source</p>
                    <h2>Original text</h2>
                </div>
                <div class="panel-actions">
                    <span id="textModeLoading" class="loading-pill hidden" aria-live="polite">
                        <span class="spinner" aria-hidden="true"></span>Translating...
                    </span>
                    <button id="clearTextBtn" class="icon-btn" aria-label="Clear text" title="Clear text">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                </div>
            </div>
            <label for="textInput" class="sr-only">Source text</label>
            <textarea id="textInput" class="text-input-area" placeholder="Paste a passage, article section, or research note here..." aria-describedby="sourceTitle"></textarea>
            <div class="panel-footer">
                <span class="char-count" id="charCount">0 characters</span>
                <div class="action-row">
                    <button id="copySourceBtn" class="ghost-btn small" title="Copy source text">Copy</button>
                    <button id="translateTextBtn" class="primary-btn" title="Translate (Ctrl + Enter)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h8M4 2v2M2 6c1 2 2.5 3.5 5 4m-3-2c1 2 2 3.5 4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 8l2 6 2-6M10 14h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Translate
                    </button>
                </div>
            </div>
        </article>

        <!-- Divider handle (visual) -->
        <div class="workspace-divider" aria-hidden="true">
            <div class="divider-line"></div>
        </div>

        <!-- Output column -->
        <article class="panel panel-output">
            <div class="panel-header">
                <div>
                    <p class="eyebrow">Translation</p>
                    <h2 id="translationTitle">Translated output</h2>
                </div>
                <div class="panel-actions">
                    <button id="copyTranslationBtnText" class="ghost-btn small" title="Copy translation">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M9 5V3a1.5 1.5 0 00-1.5-1.5h-4A1.5 1.5 0 002 3v4A1.5 1.5 0 003.5 8.5H5" stroke="currentColor" stroke-width="1.2"/></svg>
                        Copy
                    </button>
                </div>
            </div>
            <div id="translationAreaText" class="translation-area" aria-live="polite">
                <div class="empty-state centered">
                    <div class="empty-icon" aria-hidden="true">&#128196;</div>
                    <strong>Your translation will appear here</strong>
                    <span>Paste text and click Translate to begin</span>
                </div>
            </div>
        </article>
    </div>
</section>
